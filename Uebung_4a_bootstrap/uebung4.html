<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übung 4</title>
    <!-- <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    
</head>
<body>
    <main class="container">
        <legend><b>Teilnehmerin Registrierung</b></legend>        
        <div class="row"> <!--Für Grid-Konzept-->

            <div class="col-12 col-md-6 col-xl-3"> <!--Für Grid-Konzept-->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputFirstName" placeholder="First name">          
                    <label for="exampleInputFirstName">First name</label>
                </div>    
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputLastName" placeholder="Last name">          
                    <label for="exampleInputLastName">Last name</label>
                </div>
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="E-Mail">          
                    <label for="exampleInputEmail1">E-mail</label>
                </div>    
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputIp" placeholder="IP-Adress">          
                    <label for="exampleInputIp">IP-Adresse</label>
                </div>
            </div>

            <div class="col-6">
                <button type="cancel" class="btn btn-secondary">Abbrechen</button>
            </div>
            
            <div class="col-6">
                <button type="submit" class="btn btn-success">Registrieren</button>
            </div>
        
        </div>    
    </main>   
</body>
</html>
