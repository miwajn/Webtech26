<main class="d-flex align-items-center min-vh-50">
  <fieldset class="container col-5 col-offset-4" id="signup">
    <h3 class="mb-3">Registrierung</h3>
    <h5 class="mb-3">Um sich auf unserer Plattform zu registrieren, geben Sie bitte folgende Informationen an:</h5>

    <form>
      <div class="row mb-3">
        <label for="inputVorname" class="col-sm-2 col-form-label">Vorname:</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" [formControl]="vornameControl" id="inputVorname">
        </div>
      </div>

      <div class="row mb-3">
        <label for="inputNachname" class="col-sm-2 col-form-label">Nachname:</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" [formControl]="nachnameControl" id="inputNachname">
        </div>
      </div>

      <div class="row mb-3">
        <label for="inputEmail" class="col-sm-2 col-form-label">E-Mail:</label>
        <div class="col-sm-10">
          <input type="email" class="form-control" [formControl]="emailControl" id="inputEmail">
        </div>
      </div>

      <div class="row mb-3">
        <label for="password" class="col-sm-2 col-form-label">Passwort:</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" [formControl]="passwordControl" id="inputPassword">
        </div>
      </div>

      <div class="mb-3">
        <button class="btn btn-secondary" [disabled]="!isValid()" (click)="create()">Registrieren</button>
      </div>

    </form>
  </fieldset>
</main>
