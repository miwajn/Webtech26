<main class="d-flex align-items-center min-vh-100">
    <fieldset class="container col-4 col-offset-4" id="login">

        <h3 class="mb-3">Login</h3>

        <form>
            <div class="form-group mb-3">
                <input type="text" class="form-control" placeholder="Benutzername" [formControl]="emailControl" id="benutzername">
                <!--[formControl] = Angular-Direktive aus ReactiveFormsModule / bindet das Input-Feld an ein FormControl-Objekt in der Komponente-->
            </div>
            <div class="form-group mb-3">
                <input type="password" class="form-control" placeholder="Passwort" [formControl]="passwordControl" id="password">
            </div>
            <div class="mb-3">
                <button type="button" class="btn btn-secondary" [disabled]="!isValid()" (click)="login()">Login</button>
            </div>

            <p *ngIf="loginFehler" class="text-danger">
                E-Mail oder Passwort falsch.
            </p>
        </form>
    </fieldset>
</main>
