<main class="d-flex align-items-center min-vh-100">
    <fieldset class="container col-4 col-offset-4" id="login">
        <h3 class="mb-3">Login</h3>
        <form>
            <div class="form-group mb-3">
                <input type="text" class="form-control" id="login1" placeholder="Benutzername" [(ngModel)]="email">
                <!--[(ngModel)] = Angular-Direktive aus FormsModule / Two-Way-Binding von Komponente in HTML und zurück-->
            </div>
            <div class="form-group mb-3">
                <input type="password" class="form-control" id="login2" placeholder="Passwort" [(ngModel)]="password">
            </div>
            <div class="mb-3">
                <button type="button" class="btn btn-secondary" (click)="login()">Login</button>
            </div>
        </form>
    </fieldset>
</main>
