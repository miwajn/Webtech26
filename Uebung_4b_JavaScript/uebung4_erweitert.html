<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    
    <title>Übung 4b</title>
</head>
<body>
    <main class="container">
        <legend><b>Teilnehmerin Registrierung</b></legend>        
       
    <form>
        <div class="row"> <!--Für Grid-Konzept-->

            <div class="col-12 col-md-6 col-xl-3"> <!--Für Grid-Konzept-->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputFirstName" placeholder="First name" required>          
                    <label for="exampleInputFirstName">First name</label>
                    <div class="valid-feedback">Eingabe erfolgreich</div>
                    <div class="invalid-feedback">Eingabe erforderlich</div>
                </div>    
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputLastName" placeholder="Last name" required>          
                    <label for="exampleInputLastName">Last name</label>
                </div>
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="name@example.com" required>          
                    <label for="exampleInputEmail1">E-mail</label>
                </div>    
            </div>

            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="exampleInputIp" placeholder="IP-Adress" required>          
                    <label for="exampleInputIp">IP-Adress</label>
                </div>
            </div>

            <div class="row">
                <div class="col-12 col-sm-3">
                    <button type="cancel" class="btn btn-secondary" onclick="functionCancel()">Abbrechen</button>
                    <div id="responseCancel"></div>
                </div>
            </div>
            
            <div class="col-6">
                <button type="submit" class="btn btn-success" onclick="register()">Registrieren</button>
                <div id="responseRegister"></div>
            </div>
        
        </div> 
    </form>   

        <h3 class="mt-5">Eingegebene Werte</h3>
        <ul id="output" class="list-group"></ul>

    </main>
</body>  
<script>
        function register(){
            event.preventDefault() //wenn form und submit-Button, ist dieser Teil notwendig
            console.log('Registrieren-Button geklickt')
                
        /*function functionRegister(){
            document.getElementById("responseRegister").innerHTML = "Sie wurden registriert.";
        }
        function functionCancel(){
            document.getElementById("responseCancel").innerHTML = "Die Angaben wurden zurückgesetzt.";
        }*/
       
        // Eingaben auslesen
        let firstNameElement = document.querySelector('#exampleInputFirstName');
        console.log(firstNameElement)
        let firstNameValue = firstNameElement.value;
        console.log(firstNameValue)
        let lastNameElement = document.querySelector('#exampleInputLastName')
        let lastNameValue = lastNameElement.value;
        let emailElement = document.querySelector('#exampleInputEmail')
        let emailValue = emailElement.value;
        let ipaddressElement = document.querySelector('#exampleInputIp')
        let ipaddressValue = ipaddressElement.value;

        // Eingaben auf Konsole ausgeben
        console.log('firstNameValue : ', firstNameValue)
        console.log('lastNameValue : ', lastNameValue)
        console.log('emailValue : ', emailValue)
        console.log('ipaddressValue : ', ipaddressValue)

        let inputAll = document.querySelectorAll('input')
        console.log(inputAll)
        inputOk = true;
        for(let index = 0; index < inputAll.length; index++)
        {
        if(inputAll[index].value == "") {
            inputOk = false;
            inputAll[index].classList.add('is-invalid')
            inputAll[index].classList.remove('is-valid')
        } else {
            inputAll[index].classList.add('is-valid')
            inputAll[index].classList.remove('is-invalid')
        }
        }

        for(let input of inputAll) {
        console.log('inputs : ', input)
        }

        let outputListe = document.querySelector('#output')
        let h3 = document.querySelector('h3')
        if(inputOk) {
        h3.textContent = "Eingegebene Werte"
        h3.style.color = "black";
        outputListe.innerHTML = `<li class="list-group-item"> Vorname: ${firstNameValue}</li>
                                <li class="list-group-item"> Nachname: ${lastNameValue}</li>
                                <li class="list-group-item"> E-Mail: ${emailValue}</li>
                                <li class="list-group-item"> IP-Adresse: ${ipaddressValue}</li>`
        }
        else {
        h3.textContent = "Alle Werte erforderlich!"
        h3.style.color = "red";
        }
    }
   
        
</script> 

</html>
