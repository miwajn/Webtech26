<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <title>Bootstrap Form</title>
</head>
<body>
    <form>

        <legend><b>Teilnehmerin Registrierung</b></legend>        
        
        <div class="mb-3">
            <input type="firstName" class="form-control" id="exampleInputFirstName" placeholder="First name">          
        </div>

        <div class="mb-3">
            <input type="lastName" class="form-control" id="exampleInputLastName" placeholder="Last name">          
        </div>

        <div class="mb-3">
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="E-Mail">          
        </div>

        <div class="mb-3">
            <input type="ipAdress" class="form-control" id="exampleInputIp" placeholder="IP-Adress">          
        </div>

        <button type="reset" class="btn btn-secondary">Abbrechen</button>
        <button type="submit" class="btn btn-success">Registrieren</button>
    
    </form>
    
</body>
</html>
