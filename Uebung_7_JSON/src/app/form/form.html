<div class="container">
  <h3 class="my-3">Neue Teilnehmerin</h3>

  <div class="row mb-3">
    <label for="inputVorname" class="col-sm-2 col-form-label">Vorname</label>
    <div class="col-sm-10">
      <input type="text" [formControl]="vornameControl" class="form-control" id="inputVorname">
    </div>
  </div>

  <div class="row mb-3">
    <label for="inputNachname" class="col-sm-2 col-form-label">Nachname</label>
    <div class="col-sm-10">
      <input type="text" [formControl]="nachnameControl" class="form-control" id="inputNachname">
    </div>
  </div>

  <div class="row mb-3">
    <label for="inputEmail" class="col-sm-2 col-form-label">E-Mail</label>
    <div class="col-sm-10">
      <input type="email" [formControl]="emailControl" class="form-control" id="inputEmail">
    </div>
  </div>

  <div class="row mb-3">
    <label for="inputIpAdresse" class="col-sm-2 col-form-label">IP-Adresse</label>
    <div class="col-sm-10">
      <input type="text" [formControl]="ipAdresseControl" class="form-control" id="inputIpAdresse">
    </div>
  </div>

  <button (click)="create()" [disabled]="!isValid()" class="btn btn-success mb-5">Create</button>
</div>
